{% extends "base.html" %}

{% block title %}
    Faça a sua doação!
{% endblock %}

{% block style %}
    <style>

        :root{
            --verde: #9bd3a6;
            --preto: black;
            --branco: white;
            --azul: rgb(63, 234, 234);
        }

        section{
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 30px;
            background-color: var(--branco);
            box-shadow: 1px 1px 10px var(--preto);
            border-radius: 15px;
            padding: 30px 30px;
        }
        section h1{
            color: var(--verde);
            font-size: 48px;
        }
        section p{
            font-size: 20px;
        }

        form{
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        input{
            width: 100%;
            height: 20px;
            border-radius: 5px;
            border: 1px solid var(--preto);
        }

        button{
            background-color: var(--verde);
            border: none;
            padding: 15px 30px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover{
            background-color: var(--verde-hover);
            transition: 0.4s;
            transform: scale(1.05);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        a{
            font-size: 20px;
            color: var(--preto);
            text-decoration: none;
        }
    </style>
{% endblock %}

{% block content %}
    <section>
        <h1>FAÇA UMA DOAÇÃO</h1>
        <p>INSIRA OS DADOS REQUISITADOS</p>
        <form method="POST">
            <input type="text" name="nome" placeholder="Nome" required>
            <input type="text" name="tamanho" placeholder="Tamanho" required>
            <input type="text" name="estado" placeholder="Estado" required>
            <input type="text" name="descricao" placeholder="Descrição" required>
            <button>DOAR</button>
        </form>
    </section>
    <a href="{{url_for('index')}}">< Voltar</a>
{% endblock %}
