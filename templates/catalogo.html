{% extends "base.html" %}

{% block title %}
    Suas doações
{% endblock %}

{% block style %}
    <style>
        :root{
            --verde: #9bd3a6;
            --verde-hover: #57705c;
            --background: #f1f0f0;
            }

        section{
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 60px;
            flex-wrap: wrap;
            padding: 30px 0;
        }

        section > div{
            display: flex;
            flex-direction: column;
            width: 280px;
            height: 200px;
            background-color: var(--background);
            border: 2px solid var(--verde);
            border-radius: 15px;
            text-align: center;
            padding: 20px;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }
        
        section button{
            background-color: var(--verde);
            border: none;
            padding: 8px 20px;
            border-radius: 15px;
            cursor: pointer;
        }

        section button:hover{
            background-color: var(--verde-hover);
            transition: 0.4s;
            transform: scale(1.05);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
    </style>
{% endblock %}

{% block content %}
    <section>
       {% for roupa in roupas %}
            <div>
                <h3>{{ roupa.nome }}</h3>
                <p>{{ roupa.tamanho }}</p>
                <p>{{ roupa.estado }}</p>
                <p>{{ roupa.descricao }}</p>
                <a href="{{ url_for('editar', id=roupa.id) }}">
                    <button>Editar</button>
                </a>
            </div>
        {% endfor %}
    </section>
{% endblock %}
