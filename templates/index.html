{% extends "base.html" %}

{% block title %}
    Reveste Doação
{% endblock %}

{% block style %}
    <style>
        :root{
            --verde: #9bd3a6;
            --verde-hover: #57705c;
            --background: #f1f0f0;
            }

        section{
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 60px;
        }

        section > img{
            width: 1000px;
        }

        section > div{
            display: flex;
            flex-direction: column;
            width: 280px;
            height: 200px;
            background-color: var(--background);
            border: 2px solid var(--verde);
            border-radius: 15px;
            text-align: center;
            padding: 20px;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }
        
        section > div > img{
            width: 60%;
        }

        section button{
            background-color: var(--verde);
            border: none;
            padding: 8px 20px;
            border-radius: 15px;
            cursor: pointer;
        }

        section button:hover{
            background-color: var(--verde-hover);
            transition: 0.4s;
            transform: scale(1.05);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
    </style>
{% endblock %}

{% block content %}
    <section>
        <img src="{{ url_for('static', filename='imgs/doer.png') }}" alt="Banner">
    </section>

    <section>
        <div>
            <h3>Cadastre sua peça aqui</h3>
            <img src="{{ url_for('static', filename='imgs/roupas1.png') }}">
            <a href="{{ url_for('cadastro_roupa') }}" >
                <button>Cadastrar</button>
            </a>
        </div>
        <div>
            <h3>Encontre peças para você</h3>
            <img src="{{ url_for('static', filename='imgs/roupa2.png') }}">   
            <a href="{{ url_for('catalogo') }}" >
                <button>Ir para catálogo</button>
            </a>
        </div>
                       
    </section>
{% endblock %}
